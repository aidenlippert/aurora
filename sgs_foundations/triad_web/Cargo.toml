[package]
name = "triad_web"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0" # Still useful for human-readable parts or configs
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "io-util", "sync"] }
async-trait = "0.1.77" # Check latest
bytes = "1.5.0" # Check latest
bincode = "1.3.3" # For efficient binary serialization over network
futures = "0.3" # For stream utilities if needed

# For peer management, if we go beyond simple connections
# once_cell = "1.19.0" # May not be needed if TcpP2PService manages its own state
# uuid = { version = "1.8.0", features = ["v4"] } # If message IDs need UUIDs

# Dependencies for sub-modules if they were separate crates
# nebula_pulse_swarm = { path = "./nebula_pulse_swarm" } # Example if structured as sub-crates
# graviton_edge = { path = "./graviton_edge" }
# titanforge_grid = { path = "./titanforge_grid" }
